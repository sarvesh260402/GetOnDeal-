<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | GetOnDeal</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <!-- Tailwind for utilities -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #0f172a 0%, #115e59 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--primary-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        .auth-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 2rem;
            width: 100%;
            max-width: 440px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #94a3b8;
        }

        .input-group input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            color: white;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-group input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #2dd4bf;
            box-shadow: 0 0 0 4px rgba(45, 212, 191, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #2dd4bf 0%, #14b8a6 100%);
            color: #0f172a;
            font-weight: 700;
            padding: 0.85rem;
            border-radius: 0.75rem;
            width: 100%;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.9rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px #2dd4bf;
            filter: brightness(1.1);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .logo-text {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-weight: 800;
            font-size: 2rem;
            letter-spacing: -0.05em;
            background: linear-gradient(to right, #ffffff, #2dd4bf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .accent-blob {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(45, 212, 191, 0.15) 0%, transparent 70%);
            filter: blur(40px);
            z-index: -1;
        }

        .loading-spinner {
            display: none;
            width: 1.2rem;
            height: 1.2rem;
            border: 3px solid rgba(15, 23, 42, 0.3);
            border-top: 3px solid #0f172a;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
            padding: 0.75rem;
            border-radius: 0.75rem;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            display: none;
        }
    </style>
</head>

<body>
    <div class="accent-blob" style="top: -100px; right: -100px;"></div>
    <div class="accent-blob" style="bottom: -100px; left: -100px;"></div>

    <div class="auth-card fade-in">
        <div class="text-center mb-8">
            <h1 class="logo-text mb-2">Get%nDeal</h1>
            <p class="text-slate-400 text-sm">Mumbai’s exclusive dining experience</p>
        </div>

        <h2 class="text-2xl font-semibold mb-6 text-center">Welcome Back</h2>

        <div id="errorMessage" class="error-message"></div>

        <form id="loginForm">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="name@example.com" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <div class="flex items-center justify-between mb-8">
                <div class="flex items-center">
                    <input type="checkbox" id="remember"
                        class="w-4 h-4 rounded border-slate-700 bg-slate-800 text-teal-500 focus:ring-teal-500">
                    <label for="remember" class="ml-2 text-xs text-slate-400">Remember me</label>
                </div>
                <a href="#" class="text-xs text-teal-400 hover:text-teal-300 transition-colors">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-primary flex items-center justify-center gap-2">
                <span id="btnText">Sign In</span>
                <div id="loader" class="loading-spinner"></div>
            </button>
        </form>

        <p class="mt-8 text-center text-slate-400 text-sm">
            Don't have an account?
            <a href="signup.html" class="text-teal-400 font-semibold hover:text-teal-300 transition-colors">Register
                Now</a>
        </p>
    </div>

    <script src="assets/js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // auth.js will handle the actual API call
            if (window.handleLogin) {
                window.handleLogin(email, password);
            }
        });
    </script>
</body>

</html>
